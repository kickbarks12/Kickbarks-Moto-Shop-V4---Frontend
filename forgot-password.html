<!DOCTYPE html>
<html>

<head>
    <title>Forgot Password</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="./images/logo.png" type="image/x-icon" sizes="64x64">
    <!-- Bootstrap (needed for layout classes) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Your theme -->
    <link rel="stylesheet" href="./css/theme.css">
</head>

<body>

    <div class="container min-vh-100 d-flex align-items-center justify-content-center">

        <div class="card p-4" style="max-width:420px;width:100%">
            <div class="text-center mb-3">
                <img src="./images/logo.png" alt="Kickbarks" style="height:60px;">
            </div>
            <h3 class="text-center mb-2">Forgot Password</h3>
            <p class="text-muted text-center">
                Enter your email to receive reset link
            </p>

            <input id="email" type="email" class="form-control mb-3" placeholder="Email">

            <button id="sendBtn" class="btn btn-dark btn-lg w-100 fw-semibold">
                Send Reset Link
            </button>
            <div class="text-center mt-3">
                <small>
                    Remember your password? <a href="./login.html">Login</a>
                </small>
            </div>
            <p id="msg" class="text-center mt-3 text-muted"></p>

        </div>

    </div>

    <script src="./js/ui.js"></script>
    <script src="./js/forgot-password.js"></script>

</body>

</html>
