<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Orders</title>
    <link rel="icon" href="../images/logo.png" type="image/x-icon" sizes="64x64">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/admin.css">
    <script src="/js/admin/adminAuth.js"></script>
</head>

<body>
    <nav class="navbar navbar-light bg-light border-bottom d-md-none px-3">

        <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobileSidebar">

            <span class="navbar-toggler-icon"></span>

        </button>

        <span class="navbar-brand mx-auto">Dashboard</span>

    </nav>
    <div class="offcanvas offcanvas-start bg-light text-dark d-md-none" tabindex="-1" id="mobileSidebar">

        <div class="offcanvas-header">
            <h5 class="offcanvas-title">Kickbarks</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas">
            </button>
        </div>

        <div class="offcanvas-body">

            <ul class="nav flex-column">

                <li class="nav-item">
                    <a class="nav-link text-dark" href="/admin/dashboard.html">Dashboard</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-dark" href="/admin/products.html">Products</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-dark" href="/admin/orders.html">Orders</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-dark" href="/admin/users.html">Users</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-dark" href="/admin/vouchers.html">Vouchers</a>
                </li>

                <li class="mt-3">
                    <button onclick="adminLogout()" class="btn btn-danger w-100">
                        Logout
                    </button>
                </li>

            </ul>

        </div>

    </div>
    <div class="container-fluid">
        <div class="row">

            <!-- SIDEBAR -->
            <div class="col-md-2 bg-light text-dark min-vh-100 p-3 d-none d-md-block border-end">

                <h4 class="mb-4">Kickbarks</h4>

                <ul class="nav flex-column">

                    <li class="nav-item">
                        <a class="nav-link text-dark" href="/admin/dashboard.html">Dashboard</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link text-dark" href="/admin/products.html">Products</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link text-dark active" href="/admin/orders.html">Orders</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link text-dark" href="/admin/users.html">Users</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link text-dark" href="/admin/vouchers.html">Vouchers</a>
                    </li>

                    <li class="nav-item mt-3">
                        <button onclick="adminLogout()" class="btn btn-danger w-100">Logout</button>
                    </li>

                </ul>

            </div>


            <!-- MAIN CONTENT -->
            <div class="col-md-10 p-4">

                <h2 class="mb-4">Orders</h2>

                <!-- FILTER TOOLBAR -->
                <div class="card shadow-sm mb-4">
                    <div class="card-body">

                        <div class="row g-3 align-items-center">

                            <div class="col-md-3">
                                <select id="statusFilter" class="form-select">
                                    <option value="">All Status</option>
                                    <option value="Pending">Pending</option>
                                    <option value="Preparing">Preparing</option>
                                    <option value="Ship out">Ship out</option>
                                    <option value="Out for delivery">Out for delivery</option>
                                    <option value="Delivered">Delivered</option>
                                    <option value="Cancelled">Cancelled</option>
                                </select>
                            </div>

                            <div class="col-md-4">
                                <input id="searchOrder" class="form-control" placeholder="Search order #">
                            </div>

                            <div class="col-md-3">
                                <button id="exportCsvBtn" class="btn btn-outline-primary w-100">
                                    Export Orders (CSV)
                                </button>
                            </div>

                        </div>

                    </div>
                </div>


                <!-- ORDERS TABLE -->
                <div class="card shadow-sm">
                    <div class="card-body">

                        <div class="table-responsive">

                            <table class="table table-striped align-middle">

                                <thead class="table-light">


                                    <tr>
                                        <th>Order #</th>
                                        <th>Customer</th>
                                        <th>Items</th>
                                        <th>Total</th>
                                        <th>Payment</th>
                                        <th>Status</th>
                                        <th>Update</th>
                                    </tr>


                                </thead>

                                <tbody id="ordersTable"></tbody>

                            </table>

                        </div>

                    </div>
                </div>


            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/admin/orders.js"></script>

</body>

</html>
