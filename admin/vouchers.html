<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Vouchers</title>
    <link rel="icon" href="../images/logo.png" type="image/x-icon" sizes="64x64">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/admin.css">
    <script src="/js/admin/adminAuth.js"></script>
</head>

<body>
    <nav class="navbar navbar-light bg-light border-bottom d-md-none px-3">

        <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobileSidebar">

            <span class="navbar-toggler-icon"></span>

        </button>

        <span class="navbar-brand mx-auto">Dashboard</span>

    </nav>
    <div class="offcanvas offcanvas-start bg-light text-dark d-md-none" tabindex="-1" id="mobileSidebar">

        <div class="offcanvas-header">
            <h5 class="offcanvas-title">Kickbarks</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas">
            </button>
        </div>

        <div class="offcanvas-body">

            <ul class="nav flex-column">

                <li class="nav-item">
                    <a class="nav-link text-dark" href="/admin/dashboard.html">Dashboard</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-dark" href="/admin/products.html">Products</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-dark" href="/admin/orders.html">Orders</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-dark" href="/admin/users.html">Users</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-dark" href="/admin/vouchers.html">Vouchers</a>
                </li>

                <li class="mt-3">
                    <button onclick="adminLogout()" class="btn btn-danger w-100">
                        Logout
                    </button>
                </li>

            </ul>

        </div>

    </div>
    <div class="container-fluid">
        <div class="row">

            <!-- SIDEBAR -->
            <div class="col-md-2 bg-light text-dark min-vh-100 p-3 d-none d-md-block border-end">

                <h4 class="mb-4">Kickbarks</h4>

                <ul class="nav flex-column">

                    <li class="nav-item">
                        <a class="nav-link text-dark" href="/admin/dashboard.html">Dashboard</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link text-dark" href="/admin/products.html">Products</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link text-dark" href="/admin/orders.html">Orders</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link text-dark" href="/admin/users.html">Users</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link text-dark active" href="/admin/vouchers.html">Vouchers</a>
                    </li>

                    <li class="nav-item mt-3">
                        <button onclick="adminLogout()" class="btn btn-danger w-100">
                            Logout
                        </button>
                    </li>

                </ul>

            </div>


            <!-- MAIN CONTENT -->
            <div class="col-md-10 p-4">

                <h2 class="mb-4">Voucher Management</h2>

                <!-- CREATE VOUCHER -->
                <div class="card shadow-sm mb-4">
                    <div class="card-body">

                        <h5 class="mb-3">Create Voucher</h5>

                        <div class="row g-3">

                            <div class="col-md-4">
                                <input id="code" class="form-control" placeholder="Code (e.g. SAVE100)">
                            </div>

                            <div class="col-md-4">
                                <input id="amount" class="form-control" placeholder="Amount">
                            </div>

                            <div class="col-md-4">
                                <input id="minSpend" class="form-control" placeholder="Min Spend">
                            </div>

                            <div class="col-12">
                                <button onclick="createVoucher()" class="btn btn-dark">
                                    Create Voucher
                                </button>
                            </div>

                        </div>

                    </div>
                </div>


                <!-- VOUCHER LIST -->
                <div class="card shadow-sm mb-4">
                    <div class="card-body">

                        <h5 class="mb-3">Vouchers</h5>

                        <div class="table-responsive">

                            <table class="table table-striped align-middle">

                                <thead class="table-light">
                                    <tr>
                                        <th>Code</th>
                                        <th>Amount</th>
                                        <th>Min Spend</th>
                                        <th>Status</th>
                                        <th>Action</th>
                                    </tr>
                                </thead>

                                <tbody id="voucherTable"></tbody>

                            </table>

                        </div>

                    </div>
                </div>


                <!-- ASSIGN VOUCHER -->
                <div class="card shadow-sm">
                    <div class="card-body">

                        <h5 class="mb-3">Assign Voucher to User</h5>

                        <div class="row g-3">

                            <div class="col-md-5">
                                <select id="assignUserSelect" class="form-select"></select>
                            </div>

                            <div class="col-md-5">
                                <select id="assignVoucherSelect" class="form-select"></select>
                            </div>

                            <div class="col-md-2">
                                <button onclick="assignVoucherToUser()" class="btn btn-primary w-100">
                                    Assign
                                </button>
                            </div>

                        </div>

                    </div>
                </div>


            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/admin/vouchers.js"></script>

</body>

</html>
