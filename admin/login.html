<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Kickbarks Admin Login</title>
    <link rel="icon" href="../images/logo.png" type="image/x-icon" sizes="64x64">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Your existing CSS -->
    <link rel="stylesheet" href="../css/admin.css">
</head>

<body class="admin-login-body">

    <div class="login-container">

        <div class="login-box">

            <div class="logo">Kickbarks Admin</div>
            <h3 class="text-white mb-4">Admin Login</h3>

            <input id="email" class="form-control admin-input mb-3" placeholder="Admin email">

            <input id="password" type="password" class="form-control admin-input mb-3" placeholder="Password">

            <button onclick="adminLogin()" class="btn admin-login-btn w-100">
                Login
            </button>

            <p id="error" class="login-error"></p>

        </div>

    </div>
    <script src="../js/ui.js"></script>
    <script src="../js/admin/admin.js"></script>

</body>

</html>
