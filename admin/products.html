<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Products</title>
  <link rel="icon" href="../images/logo.png" type="image/x-icon" sizes="64x64">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/admin.css">
  <script src="/js/admin/adminAuth.js"></script>

</head>

<body>
  <nav class="navbar navbar-light bg-light border-bottom d-md-none px-3">

    <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobileSidebar">

      <span class="navbar-toggler-icon"></span>

    </button>

    <span class="navbar-brand mx-auto">Dashboard</span>

  </nav>
  <div class="offcanvas offcanvas-start bg-light text-dark d-md-none" tabindex="-1" id="mobileSidebar">

    <div class="offcanvas-header">
      <h5 class="offcanvas-title">Kickbarks</h5>
      <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas">
      </button>
    </div>

    <div class="offcanvas-body">

      <ul class="nav flex-column">

        <li class="nav-item">
          <a class="nav-link text-dark" href="/admin/dashboard.html">Dashboard</a>
        </li>

        <li class="nav-item">
          <a class="nav-link text-dark" href="/admin/products.html">Products</a>
        </li>

        <li class="nav-item">
          <a class="nav-link text-dark" href="/admin/orders.html">Orders</a>
        </li>

        <li class="nav-item">
          <a class="nav-link text-dark" href="/admin/users.html">Users</a>
        </li>

        <li class="nav-item">
          <a class="nav-link text-dark" href="/admin/vouchers.html">Vouchers</a>
        </li>

        <li class="mt-3">
          <button onclick="adminLogout()" class="btn btn-danger w-100">
            Logout
          </button>
        </li>

      </ul>

    </div>

  </div>
  <div class="container-fluid">

    <div class="row">

      <!-- SIDEBAR -->
      <div class="col-md-2 bg-light text-dark min-vh-100 p-3 d-none d-md-block border-end">
        <h4 class="mb-4">Kickbarks</h4>

        <ul class="nav flex-column">

          <li class="nav-item">
            <a class="nav-link text-dark" href="/admin/dashboard.html">Dashboard</a>
          </li>

          <li class="nav-item">
            <a class="nav-link text-dark active" href="/admin/products.html">Products</a>
          </li>

          <li class="nav-item">
            <a class="nav-link text-dark" href="/admin/orders.html">Orders</a>
          </li>

          <li class="nav-item">
            <a class="nav-link text-dark" href="/admin/users.html">Users</a>
          </li>

          <li class="nav-item">
            <a class="nav-link text-dark" href="/admin/vouchers.html">Vouchers</a>
          </li>

          <li class="nav-item mt-3">
            <button onclick="adminLogout()" class="btn btn-danger w-100">Logout</button>
          </li>

        </ul>

      </div>


      <!-- MAIN CONTENT -->
      <div class="col-md-10 p-4">

        <h2 class="mb-4">Products</h2>


        <!-- ADD PRODUCT -->
        <div class="card shadow-sm mb-4">
          <div class="card-body">

            <h5 class="mb-3">Add Product</h5>

            <form id="productForm" enctype="multipart/form-data">

              <div class="row g-3">

                <div class="col-md-6">
                  <input name="name" class="form-control" placeholder="Product name" required>
                </div>

                <div class="col-md-3">
                  <input name="price_mio" type="number" class="form-control" placeholder="Mio 125 price" required>
                </div>

                <div class="col-md-3">
                  <input name="price_aerox" type="number" class="form-control" placeholder="Aerox price" required>
                </div>

                <div class="col-md-3">
                  <input name="price_click" type="number" class="form-control" placeholder="Click price" required>
                </div>

                <div class="col-md-3">
                  <input name="price_adv" type="number" class="form-control" placeholder="ADV price" required>
                </div>

                <div class="col-md-6">
                  <input name="category" class="form-control" placeholder="Category" required>
                </div>

                <div class="col-md-3">
                  <input name="stock_mio" type="number" class="form-control" placeholder="Mio stock" required>
                </div>

                <div class="col-md-3">
                  <input name="stock_aerox" type="number" class="form-control" placeholder="Aerox stock" required>
                </div>

                <div class="col-md-3">
                  <input name="stock_click" type="number" class="form-control" placeholder="Click stock" required>
                </div>

                <div class="col-md-3">
                  <input name="stock_adv" type="number" class="form-control" placeholder="ADV stock" required>
                </div>

                <div class="col-12">
                  <textarea name="description" class="form-control" placeholder="Product description"></textarea>
                </div>

                <div class="col-12">
                  <input type="file" name="images" multiple class="form-control">
                </div>

                <div class="col-12">
                  <button type="submit" class="btn btn-dark">Add Product</button>
                </div>

              </div>

            </form>

          </div>
        </div>


        <!-- PRODUCT LIST -->
        <div class="card shadow-sm">
          <div class="card-body">

            <h5 class="mb-3">Product List</h5>

            <div class="table-responsive">

              <table class="table table-striped align-middle">

                <thead>

                  <tr>
                    <th>Image</th>
                    <th class="sortable" data-sort="name">Name</th>
                    <th class="text-end sortable" data-sort="price">Price</th>
                    <th class="text-end">Actions</th>
                  </tr>

                </thead>

                <tbody id="productsTable"></tbody>

              </table>

            </div>

          </div>
        </div>


      </div>

    </div>

  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/ui.js"></script>
  <script src="../js/admin/products.js"></script>

</body>

</html>
