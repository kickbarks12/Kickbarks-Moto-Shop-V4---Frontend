<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Login | Kickbarks Moto Shop</title>

  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="./images/logo.png" type="image/x-icon" sizes="64x64">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="./css/theme.css" />



</head>

<body class="bg-light">
  <div class="container min-vh-100 d-flex justify-content-center align-items-center">
    <div class="card shadow-sm w-100 border-0" style="max-width: 420px">
      <div class="card-body p-4">
        <div class="text-center mb-3">
          <img src="./images/logo.png" alt="Kickbarks" style="height:60px;">
        </div>
        <h3 class="text-center fw-bold mb-2">Login</h3>
        <p class="text-center text-muted mb-4">
          Welcome back to Kickbarks Moto Shop
        </p>

        <!-- NORMAL LOGIN -->
        <form onsubmit="login(event)">
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input id="email" type="email" class="form-control" required />
          </div>

          <div class="mb-3">
            <label class="form-label">Password</label>
            <input id="password" type="password" class="form-control" required />
          </div>
          <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" id="rememberMe">
            <label class="form-check-label" for="rememberMe">
              Remember me
            </label>
          </div>
          <button type="submit" class="btn btn-dark btn-lg w-100 fw-semibold">
            Login
          </button>
          <a href="https://kickbarks-moto-shop.onrender.com/api/auth/google" class="btn btn-light border w-100 mt-3">
            <img src="https://www.svgrepo.com/show/475656/google-color.svg" width="18">
            Continue with Google
          </a>
        </form>



        <div class="text-center mt-3">
          <small><a href="./forgot-password.html">Forgot password?</a></small>
        </div>

        <div class="text-center mt-3">
          <small>Don’t have account? <a href="./signup.html">Sign up</a></small>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./js/ui.js"></script>
  <script src="./js/navbar.js"></script>
  <script src="./js/auth.js"></script>


</body>

</html>
