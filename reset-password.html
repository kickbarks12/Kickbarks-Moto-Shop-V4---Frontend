<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Reset Password | Kickbarks Moto Shop</title>
    <link rel="icon" href="./images/logo.png" type="image/x-icon" sizes="64x64">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/theme.css">

</head>

<body class="bg-light">

    <div class="container min-vh-100 d-flex justify-content-center align-items-center">

        <div class="card shadow-sm border-0 w-100" style="max-width:420px">

            <div class="card-body p-4">

                <div class="text-center mb-3">
                    <img src="./images/logo.png" alt="Kickbarks" style="height:60px;">
                </div>

                <h3 class="text-center fw-bold mb-2">Reset Password</h3>

                <p class="text-center text-muted mb-4">
                    Enter your new password below
                </p>

                <input type="password" id="password" class="form-control mb-3" placeholder="New Password">

                <input type="password" id="confirmPassword" class="form-control mb-3" placeholder="Confirm Password">

                <button id="resetBtn" class="btn btn-dark btn-lg w-100">
                    Update Password
                </button>

                <p id="msg" class="text-center mt-3 text-muted"></p>

                <div class="text-center mt-3">
                    <small>
                        Remember your password? <a href="./login.html">Login</a>
                    </small>
                </div>

            </div>

        </div>

    </div>

    <script src="./js/ui.js"></script>
    <script src="./js/reset-password.js"></script>
</body>

</html>
